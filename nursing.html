<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nurse Schedule</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {font-family:'Segoe UI',sans-serif;background:#f4f6f9;margin:0;}
header{background:#2c3e50;color:white;padding:15px;text-align:center;}
.container{max-width:600px;margin:30px auto;}
.dayBlock{background:#eef4fa;padding:15px;margin-bottom:15px;border-radius:10px;}
.apptItem{background:white;padding:10px;margin:8px 0;border-radius:8px;border-left:5px solid #3498db;cursor:pointer;}
</style>
</head>

<body>

<header>
<h1>Nurse Schedule</h1>
</header>

<div class="container" id="calendar"></div>

<script>
const db = supabase.createClient(
"https://xphczwydrcuvqsuthiii.supabase.co",
"sb_publishable_7SiZfx1kbnTZmAm72b0haw_ZoSrqUYs"
);

async function load(){

const {data}=await db.from("appointments").select("*");

data.sort((a,b)=>new Date(a.date+" "+a.time)-new Date(b.date+" "+b.time));

let grouped={};

data.forEach(a=>{
if(!grouped[a.date]) grouped[a.date]=[];
grouped[a.date].push(a);
});

calendar.innerHTML="";

for(let d in grouped){

let block=document.createElement("div");
block.className="dayBlock";
block.innerHTML=`<h3>${d}</h3>`;

grouped[d].forEach(a=>{
let div=document.createElement("div");
div.className="apptItem";
div.innerHTML=`${a.time} — ${a.name}`;

div.onclick=()=>alert(
`Name: ${a.name}\nDOB: ${a.dob}\nEmail: ${a.email}\nDoctor: ${a.doctor}\nNotes: ${a.notes}`
);

block.appendChild(div);
});

calendar.appendChild(block);
}
}

load();
</script>

</body>
</html>
