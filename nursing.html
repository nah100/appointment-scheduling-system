<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nurse</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h1>Nurse Schedule</h1>
<a href="index.html">Home</a>

<div id="calendar"></div>

<script>
const db=supabase.createClient(
"https://xphczwydrcuvqsuthiii.supabase.co",
"sb_publishable_7SiZfx1kbnTZmAm72b0haw_ZoSrqUYs"
);

async function load(){
const {data}=await db.from("appointments").select("*");

data.sort((a,b)=>new Date(a.date+" "+a.time)-new Date(b.date+" "+b.time));

let grouped={};
data.forEach(a=>{
if(!grouped[a.date]) grouped[a.date]=[];
grouped[a.date].push(a);
});

calendar.innerHTML="";

for(let day in grouped){
let div=document.createElement("div");
div.innerHTML="<h3>"+day+"</h3>";

grouped[day].forEach(a=>{
let item=document.createElement("div");
item.innerText=a.time+" - "+a.name;
div.appendChild(item);
});

calendar.appendChild(div);
}
}

load();
</script>

</body>
</html>
