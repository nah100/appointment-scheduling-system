<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nurse Schedule</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
    font-family:'Segoe UI',sans-serif;
    background:#f4f6f9;
    margin:0;
}

header{
 background:#2c3e50;
 color:white;
 padding:15px;
 text-align:center;
}

.container{
 max-width:600px;
 margin:30px auto;
}

.dayBlock{
 background:#eef4fa;
 padding:15px;
 margin-bottom:15px;
 border-radius:10px;
}

.apptItem{
 background:white;
 padding:10px;
 margin:8px 0;
 border-radius:8px;
 border-left:5px solid #3498db;
 cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>Nurse Schedule</h1>
</header>

<div class="container" id="calendar"></div>

<script>

/* ================= SUPABASE ================= */
const db = supabase.createClient(
"https://xphczwydrcuvqsuthiii.supabase.co",
"sb_publishable_7SiZfx1kbnTZmAm72b0haw_ZoSrqUYs"
);

/* ================= LOAD DATA ================= */
async function loadCalendar(){

const { data, error } = await db.from("appointments").select("*");

if(error){
console.log(error);
alert("Database error loading appointments");
return;
}

if(!data){
document.getElementById("calendar").innerHTML = "No appointments found";
return;
}

/* sort safely */
data.sort((a,b)=>{
return new Date(a.date+" "+a.time) - new Date(b.date+" "+b.time);
});

/* group by date */
let grouped = {};

data.forEach(a=>{
if(!grouped[a.date]) grouped[a.date]=[];
grouped[a.date].push(a);
});

const container = document.getElementById("calendar");
container.innerHTML = "";

for(let day in grouped){

let block = document.createElement("div");
block.className = "dayBlock";

block.innerHTML = `<h3>${day}</h3>`;

grouped[day].forEach(a=>{

let div = document.createElement("div");
div.className = "apptItem";

div.innerHTML = `${a.time} — ${a.name}`;

div.onclick = () => {
alert(
`Name: ${a.name}
DOB: ${a.dob}
Email: ${a.email}
Doctor: ${a.doctor}
Notes: ${a.notes || "None"}`
);
};

block.appendChild(div);
});

container.appendChild(block);
}
}

loadCalendar();

</script>

</body>
</html>
