<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Appointment System</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:'Segoe UI';background:#f4f6f9;margin:0;}
header{background:#2c3e50;color:white;padding:15px;text-align:center;position:relative;}
header button{position:absolute;top:15px;padding:8px 15px;}
.container{max-width:600px;margin:30px auto;}
.card{background:white;padding:20px;border-radius:10px;margin-bottom:20px;box-shadow:0 4px 12px rgba(0,0,0,.1);}
input,select{width:100%;padding:10px;margin-top:5px;}
button{padding:10px;margin-top:10px;background:#3498db;color:white;border:none;border-radius:6px;cursor:pointer;}

#loginBox{display:none;position:fixed;top:30%;left:50%;transform:translate(-50%,-50%);background:white;padding:20px;}
</style>
</head>

<body>

<header>
<h2>Appointments</h2>
<button style="right:120px;" onclick="openLogin('nurse')">Nurse Login</button>
<button style="right:20px;" onclick="openLogin('doctor')">Doctor Login</button>
</header>

<div class="container">

<div class="card">
<h3>Book Appointment</h3>

<input id="name" placeholder="Name">
<input id="dob" type="date">
<input id="email" placeholder="Email">
<input id="date" type="date">
<input id="time" type="time">

<select id="doctor">
<option>Dr. Smith</option>
<option>Dr. Brown</option>
</select>

<button onclick="book()">Book</button>
</div>

<div class="card">
<h3>Edit Appointment</h3>
<input id="editName" placeholder="Name">
<input id="editDOB" type="date">
<input id="newDate" type="date">
<input id="newTime" type="time">
<button onclick="edit()">Edit</button>

<h3>Cancel Appointment</h3>
<input id="cancelName" placeholder="Name">
<input id="cancelDOB" type="date">
<button onclick="cancel()">Cancel</button>
</div>

</div>

<div id="loginBox">
<h3>Login</h3>
<input id="pass" type="password">
<button onclick="login()">Enter</button>
</div>

<script>

const supabaseUrl = "https://xphczwydrcuvqsuthiii.supabase.co";
const supabaseKey = "sb_publishable_7SiZfx1kbnTZmAm72b0haw_ZoSrqUYs";
const db = supabase.createClient(supabaseUrl, supabaseKey);

let role="";

function openLogin(r){
role=r;
loginBox.style.display="block";
}

function login(){
if(pass.value!=="1234") return alert("Wrong password");
location.href = role + ".html";
}

async function book(){
const {error}=await db.from("appointments").insert([{
name:name.value,
dob:dob.value,
email:email.value,
date:date.value,
time:time.value,
doctor:doctor.value,
notes:""
}]);

if(error) alert(error.message);
else alert("Booked");
}

async function edit(){
const {data}=await db.from("appointments").select("*");
let f=data.find(a=>a.name===editName.value && a.dob===editDOB.value);
if(!f) return alert("Not found");

await db.from("appointments")
.update({date:newDate.value,time:newTime.value})
.eq("id",f.id);

alert("Updated");
}

async function cancel(){
const {data}=await db.from("appointments").select("*");
let f=data.find(a=>a.name===cancelName.value && a.dob===cancelDOB.value);
if(!f) return alert("Not found");

await db.from("appointments").delete().eq("id",f.id);
alert("Deleted");
}

</script>

</body>
</html>
