<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Appointment Scheduling</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
    font-family:'Segoe UI',sans-serif;
    background:#f4f6f9;
    margin:0;
}

header{
 background:#2c3e50;
 color:white;
 padding:15px;
 text-align:center;
 position:relative;
}

header button{
 position:absolute;
 top:15px;
 padding:8px 15px;
}

.container{
 max-width:600px;
 margin:30px auto;
}

.card{
 background:white;
 padding:20px;
 border-radius:10px;
 margin-bottom:20px;
 box-shadow:0px 4px 12px rgba(0,0,0,.1);
}

label{
 display:block;
 margin-top:10px;
 font-weight:bold;
}

input,select,textarea{
 width:100%;
 padding:10px;
 margin-top:5px;
 border-radius:6px;
 border:1px solid #ccc;
 box-sizing:border-box;
}

button{
 padding:12px;
 margin-top:10px;
 border:none;
 border-radius:6px;
 background:#3498db;
 color:white;
 cursor:pointer;
}

.secondary{background:#27ae60;}
.danger{background:#e74c3c;}

#message{
 position:fixed;
 top:20px;
 right:20px;
 color:white;
 padding:15px;
 border-radius:8px;
 display:none;
 z-index:999;
}

#loginBox,#doctorLoginBox{
 display:none;
 position:fixed;
 top:30%;
 left:50%;
 transform:translate(-50%,-50%);
 background:white;
 padding:20px;
 border-radius:10px;
 box-shadow:0 4px 12px rgba(0,0,0,.2);
}

.row{
 display:flex;
 justify-content:space-between;
 align-items:center;
 background:#ecf0f1;
 padding:12px;
 margin:10px 0;
 border-radius:8px;
}

.row button{
 width:40px;
 margin-left:12px;
}
</style>
</head>
<body>

<header>
<h1>Appointment Scheduling System</h1>
<button onclick="showDoctorLogin()" style="right:130px;">Doctor Login</button>
<button onclick="showLogin()" style="right:20px;">Nurse Login</button>
</header>

<div class="container" id="mainContainer">

<div class="card">
<h2>Book Appointment</h2>
<form id="appointmentForm">
<label>Name</label>
<input id="name" type="text">

<label>Date of Birth</label>
<input id="dob" type="date">

<label>Email</label>
<input id="email" type="email">

<label>Appointment Date</label>
<input id="date" type="date">

<label>Appointment Time</label>
<input id="time" type="time">

<label>Select Doctor</label>
<select id="doctor">
<option value="">Choose Doctor</option>
<option value="Dr. Smith">Dr. Smith</option>
<option value="Dr. Brown">Dr. Brown</option>
</select>

<button type="submit">Book Appointment</button>
</form>
</div>

<div class="card">
<h2>Manage Appointment</h2>
<button class="secondary" onclick="showEdit()">Edit Appointment</button>
<button class="danger" onclick="showCancel()">Cancel Appointment</button>

<div id="editBox" style="display:none;">
<label>Name</label>
<input id="editName">

<label>Date of Birth</label>
<input id="editDOB" type="date">

<label>New Date</label>
<input id="newDate" type="date">

<label>New Time</label>
<input id="newTime" type="time">

<label>New Doctor</label>
<select id="newDoctor">
<option value="">Doctor</option>
<option>Dr. Smith</option>
<option>Dr. Brown</option>
</select>

<button type="button" onclick="editAppointment()">Update Appointment</button>
</div>

<div id="cancelBox" style="display:none;">
<label>Name</label>
<input id="cancelName">

<label>Date of Birth</label>
<input id="cancelDOB" type="date">

<button type="button" class="danger" onclick="cancelAppointment()">Cancel Appointment</button>
</div>
</div>

</div>

<div id="loginBox">
<h3>Nurse Login</h3>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="doctorLoginBox">
<h3>Doctor Login</h3>
<select id="doctorSelect">
<option value="">Choose Doctor</option>
<option>Dr. Smith</option>
<option>Dr. Brown</option>
</select>
<input id="doctorPass" type="password" placeholder="Password">
<button onclick="doctorLogin()">Login</button>
</div>

<div id="nursePage" style="display:none;padding:20px;">
<button onclick="goBack()">⬅ Back</button>
<h2>All Appointments</h2>
<div id="nurseList"></div>
</div>

<div id="doctorPage" style="display:none;padding:20px;">
<button onclick="goBack()">⬅ Back</button>
<h2>Doctor Schedule</h2>
<div id="doctorList"></div>
</div>

<div id="message"></div>

<script>
/* -------------------- SUPABASE -------------------- */
const SUPABASE_URL = "https://xphczwydrcuvqsuthiii.supabase.co/rest/v1/";
const SUPABASE_ANON_KEY = "sb_publishable_7SiZfx1kbnTZmAm72b0haw_ZoSrqUYs";
const supabaseClient = supabase.createClient(
SUPABASE_URL,
SUPABASE_ANON_KEY
);

/* -------------------- UI -------------------- */
function showMessage(text,error=false){
 let m=document.getElementById('message');
 m.innerText=text;
 m.style.background=error?'#e74c3c':'#2ecc71';
 m.style.display='block';
 setTimeout(()=>m.style.display='none',3000);
}

function showEdit(){
 editBox.style.display='block';
 cancelBox.style.display='none';
}

function showCancel(){
 cancelBox.style.display='block';
 editBox.style.display='none';
}

function showLogin(){
 loginBox.style.display='block';
}

function showDoctorLogin(){
 doctorLoginBox.style.display='block';
}

function goBack(){
 mainContainer.style.display='block';
 nursePage.style.display='none';
 doctorPage.style.display='none';
}

/* -------------------- DATA -------------------- */
let appointments=[];

async function loadAppointments(){
const {data,error}=await supabaseClient
.from('appointments')
.select('*')
.order('date');

if(error){
 console.error(error);
 showMessage('Database load error',true);
 return;
}

appointments=data||[];
}

/* -------------------- BOOK -------------------- */
document.getElementById('appointmentForm').addEventListener('submit', async function(e){
e.preventDefault();

let appt={
name:name.value,
dob:dob.value,
email:email.value,
date:date.value,
time:time.value,
doctor:doctor.value,
notes:''
};

if(Object.values(appt).some(v=>v==='')){
showMessage('Please fill all fields',true);
return;
}

const {error}=await supabaseClient
.from('appointments')
.insert([appt]);

if(error){
showMessage('Could not save appointment',true);
return;
}

showMessage(`Success: ${appt.name} appointment booked`);
this.reset();
await loadAppointments();
});

/* -------------------- EDIT -------------------- */
async function editAppointment(){
await loadAppointments();

let found=appointments.find(a=>
a.name===editName.value &&
a.dob===editDOB.value
);

if(!found){
showMessage('Appointment not found',true);
return;
}

const updates={};
if(newDate.value) updates.date=newDate.value;
if(newTime.value) updates.time=newTime.value;
if(newDoctor.value) updates.doctor=newDoctor.value;

const {error}=await supabaseClient
.from('appointments')
.update(updates)
.eq('id',found.id);

if(error){
showMessage('Update failed',true);
return;
}

showMessage('Appointment updated');
await loadAppointments();
}

/* -------------------- CANCEL -------------------- */
async function cancelAppointment(){
await loadAppointments();

let found=appointments.find(a=>
a.name===cancelName.value &&
a.dob===cancelDOB.value
);

if(!found){
showMessage('Appointment not found',true);
return;
}

const {error}=await supabaseClient
.from('appointments')
.delete()
.eq('id',found.id);

if(error){
showMessage('Delete failed',true);
return;
}

showMessage('Appointment cancelled');
await loadAppointments();
}

/* -------------------- NURSE -------------------- */
function login(){
if(username.value==='nurse' && password.value==='1234'){
mainContainer.style.display='none';
loginBox.style.display='none';
nursePage.style.display='block';
renderNurse();
}else{
showMessage('Invalid login',true);
}
}

async function renderNurse(){
await loadAppointments();
nurseList.innerHTML='';

appointments.forEach(a=>{
let row=document.createElement('div');
row.className='row';

let info=document.createElement('span');
info.innerText=`${a.name} - ${a.date} ${a.time}`;

let del=document.createElement('button');
del.innerText='X';

del.onclick=async()=>{
if(confirm('Delete appointment?')){
await supabaseClient
.from('appointments')
.delete()
.eq('id',a.id);
renderNurse();
}
};

row.appendChild(info);
row.appendChild(del);
nurseList.appendChild(row);
});
}

/* -------------------- DOCTOR -------------------- */
function doctorLogin(){
let selectedDoctor=doctorSelect.value;

if(!selectedDoctor || doctorPass.value!=='1234'){
showMessage('Invalid login',true);
return;
}

mainContainer.style.display='none';
doctorLoginBox.style.display='none';
doctorPage.style.display='block';
renderDoctor(selectedDoctor);
}

async function renderDoctor(doc){
await loadAppointments();
doctorList.innerHTML='';

appointments
.filter(a=>a.doctor===doc)
.forEach(a=>{

let div=document.createElement('div');
div.className='card';

let info=document.createElement('p');
info.innerText=`${a.name} — ${a.date} ${a.time}`;

let notes=document.createElement('textarea');
notes.value=a.notes||'';

let btn=document.createElement('button');
btn.innerText='Save Notes';

btn.onclick=async()=>{
await supabaseClient
.from('appointments')
.update({notes:notes.value})
.eq('id',a.id);
showMessage('Notes saved');
};

div.appendChild(info);
div.appendChild(notes);
div.appendChild(btn);
doctorList.appendChild(div);
});
}

loadAppointments();
</script>

</body>
</html>
