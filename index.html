<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Appointment Scheduling</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
    font-family:'Segoe UI',sans-serif;
    background:#f4f6f9;
    margin:0;
}

header{
 background:#2c3e50;
 color:white;
 padding:15px;
 text-align:center;
 position:relative;
}

header button{
 position:absolute;
 top:15px;
 padding:8px 15px;
}

.container{
 max-width:600px;
 margin:30px auto;
}

.card{
 background:white;
 padding:20px;
 border-radius:10px;
 margin-bottom:20px;
 box-shadow:0px 4px 12px rgba(0,0,0,.1);
}

label{
 display:block;
 margin-top:10px;
 font-weight:bold;
}

input,select,textarea{
 width:100%;
 padding:10px;
 margin-top:5px;
 border-radius:6px;
 border:1px solid #ccc;
 box-sizing:border-box;
}

button{
 padding:12px;
 margin-top:10px;
 border:none;
 border-radius:6px;
 background:#3498db;
 color:white;
 cursor:pointer;
}

.secondary{background:#27ae60;}
.danger{background:#e74c3c;}

#message{
 position:fixed;
 top:20px;
 right:20px;
 color:white;
 padding:15px;
 border-radius:8px;
 display:none;
 z-index:999;
}

#loginBox,#doctorLoginBox{
 display:none;
 position:fixed;
 top:30%;
 left:50%;
 transform:translate(-50%,-50%);
 background:white;
 padding:20px;
 border-radius:10px;
 box-shadow:0 4px 12px rgba(0,0,0,.2);
}

.row{
 display:flex;
 justify-content:space-between;
 align-items:center;
 background:#ecf0f1;
 padding:12px;
 margin:10px 0;
 border-radius:8px;
}
</style>
</head>

<body>

<header>
<h1>Appointment Scheduling System</h1>
<button onclick="showDoctorLogin()" style="right:130px;">Doctor Login</button>
<button onclick="showLogin()" style="right:20px;">Nurse Login</button>
</header>

<div class="container" id="mainContainer">

<div class="card">
<h2>Book Appointment</h2>

<form id="appointmentForm">

<label>Name</label>
<input id="name" type="text">

<label>Date of Birth</label>
<input id="dob" type="date">

<label>Email</label>
<input id="email" type="email">

<label>Appointment Date</label>
<input id="date" type="date">

<label>Appointment Time</label>
<input id="time" type="time">

<label>Select Doctor</label>
<select id="doctor">
<option value="">Choose Doctor</option>
<option value="Dr. Smith">Dr. Smith</option>
<option value="Dr. Brown">Dr. Brown</option>
</select>

<button type="submit">Book Appointment</button>
</form>
</div>

<div class="card">
<h2>Manage Appointment</h2>

<button class="secondary" onclick="showEdit()">Edit Appointment</button>
<button class="danger" onclick="showCancel()">Cancel Appointment</button>

<div id="editBox" style="display:none;">
<label>Name</label>
<input id="editName">

<label>Date of Birth</label>
<input id="editDOB" type="date">

<label>New Date</label>
<input id="newDate" type="date">

<label>New Time</label>
<input id="newTime" type="time">

<label>New Doctor</label>
<select id="newDoctor">
<option value="">Doctor</option>
<option>Dr. Smith</option>
<option>Dr. Brown</option>
</select>

<button type="button" onclick="editAppointment()">Update Appointment</button>
</div>

<div id="cancelBox" style="display:none;">
<label>Name</label>
<input id="cancelName">

<label>Date of Birth</label>
<input id="cancelDOB" type="date">

<button type="button" class="danger" onclick="cancelAppointment()">Cancel Appointment</button>
</div>

</div>

</div>

<!-- LOGIN BOXES -->
<div id="loginBox">
<h3>Nurse Login</h3>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="doctorLoginBox">
<h3>Doctor Login</h3>
<select id="doctorSelect">
<option value="">Choose Doctor</option>
<option>Dr. Smith</option>
<option>Dr. Brown</option>
</select>
<input id="doctorPass" type="password" placeholder="Password">
<button onclick="doctorLogin()">Login</button>
</div>

<!-- DASHBOARDS -->
<div id="nursePage" style="display:none;padding:20px;">
<button onclick="goBack()">⬅ Back</button>
<h2>Nurse Dashboard</h2>
<div id="nurseList"></div>
</div>

<div id="doctorPage" style="display:none;padding:20px;">
<button onclick="goBack()">⬅ Back</button>
<h2>Doctor Dashboard</h2>
<div id="doctorList"></div>
</div>

<div id="message"></div>

<script>

/* ---------------- SUPABASE ---------------- */
const SUPABASE_URL = "https://xphczwydrcuvqsuthiii.supabase.co";
const SUPABASE_KEY = "sb_publishable_7SiZfx1kbnTZmAm72b0haw_ZoSrqUYs";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ---------------- HELPERS ---------------- */
const get = (id)=>document.getElementById(id).value.trim();

function msg(text,err=false){
let m=document.getElementById("message");
m.style.background=err?"#e74c3c":"#2ecc71";
m.innerText=text;
m.style.display="block";
setTimeout(()=>m.style.display="none",3000);
}

/* ---------------- BOOK ---------------- */
document.getElementById("appointmentForm").addEventListener("submit", async (e)=>{
e.preventDefault();

const appt={
name:get("name"),
dob:get("dob"),
email:get("email"),
date:get("date"),
time:get("time"),
doctor:get("doctor"),
notes:""
};

/* ONLY REQUIRED FIELDS (FIXED) */
const required=["name","dob","email","date","time","doctor"];

for(let k of required){
if(!appt[k]){
msg("Missing: "+k,true);
return;
}
}

const {error}=await db.from("appointments").insert([appt]);

if(error){
console.log(error);
msg(error.message,true);
return;
}

msg("Appointment booked!");
e.target.reset();
refreshNurseList();
});

/* ---------------- LOAD LIST ---------------- */
async function refreshNurseList(){
const {data}=await db.from("appointments").select("*");

nurseList.innerHTML="";

data.forEach(a=>{
let row=document.createElement("div");
row.className="row";
row.innerText=`${a.name} - ${a.date} ${a.time} (${a.doctor})`;
nurseList.appendChild(row);
});
}

/* ---------------- EDIT ---------------- */
async function editAppointment(){
const name=get("editName");
const dob=get("editDOB");

const {data}=await db.from("appointments").select("*");

let found=data.find(a=>a.name===name && a.dob===dob);

if(!found){
msg("Not found",true);
return;
}

const updates={};
if(get("newDate")) updates.date=get("newDate");
if(get("newTime")) updates.time=get("newTime");
if(get("newDoctor")) updates.doctor=get("newDoctor");

await db.from("appointments").update(updates).eq("id",found.id);

msg("Updated!");
refreshNurseList();
}

/* ---------------- CANCEL ---------------- */
async function cancelAppointment(){
const name=get("cancelName");
const dob=get("cancelDOB");

const {data}=await db.from("appointments").select("*");

let found=data.find(a=>a.name===name && a.dob===dob);

if(!found){
msg("Not found",true);
return;
}

await db.from("appointments").delete().eq("id",found.id);

msg("Cancelled!");
refreshNurseList();
}

/* ---------------- LOGIN ---------------- */
function showLogin(){
document.getElementById("loginBox").style.display="block";
}

function showDoctorLogin(){
document.getElementById("doctorLoginBox").style.display="block";
}

function login(){
if(username.value==="nurse" && password.value==="1234"){
mainContainer.style.display="none";
loginBox.style.display="none";
nursePage.style.display="block";
refreshNurseList();
}else msg("Invalid login",true);
}

function doctorLogin(){
let doc=doctorSelect.value;
if(!doc || doctorPass.value!=="1234"){
msg("Invalid login",true);
return;
}

mainContainer.style.display="none";
doctorLoginBox.style.display="none";
doctorPage.style.display="block";

loadDoctor(doc);
}

/* ---------------- DOCTOR ---------------- */
async function loadDoctor(doc){
const {data}=await db.from("appointments").select("*");

doctorList.innerHTML="";

data.filter(a=>a.doctor===doc).forEach(a=>{
let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<p>${a.name} - ${a.date} ${a.time}</p>
<textarea id="n${a.id}">${a.notes||""}</textarea>
<button onclick="saveNote(${a.id})">Save Notes</button>
`;

doctorList.appendChild(div);
});
}

async function saveNote(id){
let note=document.getElementById("n"+id).value;
await db.from("appointments").update({notes:note}).eq("id",id);
msg("Saved");
}

/* ---------------- NAV ---------------- */
function goBack(){
location.reload();
}

/* ---------------- UI ---------------- */
function showEdit(){
editBox.style.display="block";
cancelBox.style.display="none";
}

function showCancel(){
cancelBox.style.display="block";
editBox.style.display="none";
}

/* INIT */
refreshNurseList();

</script>

</body>
</html>
