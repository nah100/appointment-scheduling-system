<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Appointment Scheduling System</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
    font-family:'Segoe UI',sans-serif;
    background:#f4f6f9;
    margin:0;
}

header{
 background:#2c3e50;
 color:white;
 padding:15px;
 text-align:center;
 position:relative;
}

header button{
 position:absolute;
 top:15px;
 padding:8px 15px;
}

.container{
 max-width:600px;
 margin:30px auto;
}

.card{
 background:white;
 padding:20px;
 border-radius:10px;
 margin-bottom:20px;
 box-shadow:0px 4px 12px rgba(0,0,0,.1);
}

label{
 display:block;
 margin-top:10px;
 font-weight:bold;
}

input,select,textarea{
 width:100%;
 padding:10px;
 margin-top:5px;
 border-radius:6px;
 border:1px solid #ccc;
 box-sizing:border-box;
}

button{
 padding:12px;
 margin-top:10px;
 border:none;
 border-radius:6px;
 background:#3498db;
 color:white;
 cursor:pointer;
}

.secondary{background:#27ae60;}
.danger{background:#e74c3c;}

#message{
 position:fixed;
 top:20px;
 right:20px;
 color:white;
 padding:15px;
 border-radius:8px;
 display:none;
 z-index:999;
}

#loginBox,#doctorLoginBox{
 display:none;
 position:fixed;
 top:30%;
 left:50%;
 transform:translate(-50%,-50%);
 background:white;
 padding:20px;
 border-radius:10px;
 box-shadow:0 4px 12px rgba(0,0,0,.2);
 z-index:999;
}

.row{
 display:flex;
 justify-content:space-between;
 align-items:center;
 background:#ecf0f1;
 padding:12px;
 margin:10px 0;
 border-radius:8px;
}

/* CALENDAR STYLE */
.dayBlock{
 background:#eef4fa;
 padding:15px;
 margin-bottom:15px;
 border-radius:10px;
}

.dayBlock h3{
 margin:0 0 10px 0;
}

.apptItem{
 background:white;
 padding:10px;
 margin:8px 0;
 border-radius:8px;
 cursor:pointer;
 border-left:5px solid #3498db;
}

.apptItem:hover{
 background:#f8fbff;
}

/* MODAL */
#modal{
 display:none;
 position:fixed;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 background:white;
 padding:20px;
 width:350px;
 border-radius:12px;
 box-shadow:0 6px 20px rgba(0,0,0,.3);
 z-index:1000;
}
</style>
</head>

<body>

<header>
<h1>Appointment Scheduling System</h1>
<button onclick="showDoctorLogin()" style="right:130px;">Doctor Login</button>
<button onclick="showLogin()" style="right:20px;">Nurse Login</button>
</header>

<div class="container" id="mainContainer">

<!-- BOOK -->
<div class="card">
<h2>Book Appointment</h2>

<form id="appointmentForm">

<label>Name</label>
<input id="name">

<label>Date of Birth</label>
<input id="dob" type="date">

<label>Email</label>
<input id="email">

<label>Appointment Date</label>
<input id="date" type="date">

<label>Time</label>
<input id="time" type="time">

<label>Doctor</label>
<select id="doctor">
<option value="">Choose Doctor</option>
<option value="Dr. Smith">Dr. Smith</option>
<option value="Dr. Brown">Dr. Brown</option>
</select>

<button type="submit">Book Appointment</button>
</form>
</div>

<!-- EDIT / CANCEL -->
<div class="card">
<h2>Manage Appointment</h2>

<button onclick="toggleEdit()">Edit</button>
<button onclick="toggleCancel()">Cancel</button>

<div id="editBox" style="display:none;">
<input id="editName" placeholder="Name">
<input id="editDOB" type="date">
<input id="newDate" type="date">
<input id="newTime" type="time">
<select id="newDoctor">
<option value="">Doctor</option>
<option>Dr. Smith</option>
<option>Dr. Brown</option>
</select>
<button onclick="editAppointment()">Update</button>
</div>

<div id="cancelBox" style="display:none;">
<input id="cancelName" placeholder="Name">
<input id="cancelDOB" type="date">
<button onclick="cancelAppointment()">Cancel</button>
</div>

</div>
</div>

<!-- LOGIN BOXES -->
<div id="loginBox">
<h3>Nurse Login</h3>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="doctorLoginBox">
<h3>Doctor Login</h3>
<select id="doctorSelect">
<option value="">Choose Doctor</option>
<option>Dr. Smith</option>
<option>Dr. Brown</option>
</select>
<input id="doctorPass" type="password">
<button onclick="doctorLogin()">Login</button>
</div>

<!-- NURSE PAGE (CALENDAR) -->
<div id="nursePage" style="display:none;padding:20px;">
<button onclick="goBack()">⬅ Back</button>
<h2>Nurse Schedule</h2>
<div id="calendar"></div>
</div>

<!-- DOCTOR PAGE -->
<div id="doctorPage" style="display:none;padding:20px;">
<button onclick="goBack()">⬅ Back</button>
<h2>Doctor Schedule</h2>
<div id="doctorList"></div>
</div>

<!-- MODAL -->
<div id="modal">
<h3>Appointment Details</h3>
<div id="modalContent"></div>
<button onclick="closeModal()">Close</button>
</div>

<div id="message"></div>

<script>

/* SUPABASE */
const supabaseUrl = "https://xphczwydrcuvqsuthiii.supabase.co";
const supabaseKey = "sb_publishable_7SiZfx1kbnTZmAm72b0haw_ZoSrqUYs";
const db = supabase.createClient(supabaseUrl, supabaseKey);

/* HELPERS */
const get = (id)=>document.getElementById(id).value.trim();

function msg(text,err=false){
let m=document.getElementById("message");
m.style.background=err?"#e74c3c":"#2ecc71";
m.innerText=text;
m.style.display="block";
setTimeout(()=>m.style.display="none",3000);
}

/* BOOK */
document.getElementById("appointmentForm").addEventListener("submit", async (e)=>{
e.preventDefault();

const appt={
name:get("name"),
dob:get("dob"),
email:get("email"),
date:get("date"),
time:get("time"),
doctor:get("doctor"),
notes:""
};

const required=["name","dob","email","date","time","doctor"];

for(let k of required){
if(!appt[k]){
msg("Missing: "+k,true);
return;
}
}

const {error}=await db.from("appointments").insert([appt]);

if(error){
msg(error.message,true);
return;
}

msg("Booked!");
e.target.reset();
loadCalendar();
});

/* CALENDAR */
async function loadCalendar(){

const {data}=await db.from("appointments").select("*");

let container=document.getElementById("calendar");
container.innerHTML="";

/* sort by date + time */
data.sort((a,b)=>
new Date(a.date+" "+a.time) - new Date(b.date+" "+b.time)
);

/* group by date */
let grouped={};

data.forEach(a=>{
if(!grouped[a.date]) grouped[a.date]=[];
grouped[a.date].push(a);
});

for(let day in grouped){

let block=document.createElement("div");
block.className="dayBlock";

block.innerHTML=`<h3>${day}</h3>`;

grouped[day].forEach(a=>{

let div=document.createElement("div");
div.className="apptItem";
div.innerHTML=`${a.time} — ${a.name}`;

div.onclick=()=>showDetails(a);

block.appendChild(div);

});

container.appendChild(block);
}
}

/* MODAL */
function showDetails(a){

document.getElementById("modalContent").innerHTML=`
<p><b>Name:</b> ${a.name}</p>
<p><b>DOB:</b> ${a.dob}</p>
<p><b>Email:</b> ${a.email}</p>
<p><b>Date:</b> ${a.date}</p>
<p><b>Time:</b> ${a.time}</p>
<p><b>Doctor:</b> ${a.doctor}</p>
<p><b>Notes:</b> ${a.notes||"None"}</p>
`;

document.getElementById("modal").style.display="block";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

/* LOGIN */
function showLogin(){
document.getElementById("loginBox").style.display="block";
}

function showDoctorLogin(){
document.getElementById("doctorLoginBox").style.display="block";
}

function login(){
if(username.value==="nurse" && password.value==="1234"){
mainContainer.style.display="none";
loginBox.style.display="none";
nursePage.style.display="block";
loadCalendar();
}else msg("Invalid login",true);
}

function doctorLogin(){
let doc=doctorSelect.value;
if(!doc || doctorPass.value!=="1234"){
msg("Invalid login",true);
return;
}

mainContainer.style.display="none";
doctorLoginBox.style.display="none";
doctorPage.style.display="block";
loadDoctor(doc);
}

/* DOCTOR */
async function loadDoctor(doc){

const {data}=await db.from("appointments").select("*");

doctorList.innerHTML="";

data.filter(a=>a.doctor===doc).forEach(a=>{

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<p>${a.name} — ${a.date} ${a.time}</p>
<textarea id="n${a.id}">${a.notes||""}</textarea>
<button onclick="saveNote(${a.id})">Save</button>
`;

doctorList.appendChild(div);

});
}

async function saveNote(id){
let note=document.getElementById("n"+id).value;
await db.from("appointments").update({notes:note}).eq("id",id);
msg("Saved");
}

/* NAV */
function goBack(){
location.reload();
}

/* EDIT / CANCEL */
function toggleEdit(){
editBox.style.display="block";
cancelBox.style.display="none";
}

function toggleCancel(){
cancelBox.style.display="block";
editBox.style.display="none";
}

async function editAppointment(){
const name=get("editName");
const dob=get("editDOB");

const {data}=await db.from("appointments").select("*");

let found=data.find(a=>a.name===name && a.dob===dob);

if(!found) return msg("Not found",true);

let updates={};

if(get("newDate")) updates.date=get("newDate");
if(get("newTime")) updates.time=get("newTime");
if(get("newDoctor")) updates.doctor=get("newDoctor");

await db.from("appointments").update(updates).eq("id",found.id);

msg("Updated");
loadCalendar();
}

async function cancelAppointment(){
const name=get("cancelName");
const dob=get("cancelDOB");

const {data}=await db.from("appointments").select("*");

let found=data.find(a=>a.name===name && a.dob===dob);

if(!found) return msg("Not found",true);

await db.from("appointments").delete().eq("id",found.id);

msg("Cancelled");
loadCalendar();
}

/* INIT */
loadCalendar();

</script>

</body>
</html>
