<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Appointment System</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {font-family:Arial;margin:0;background:#f4f6f9;}
header{background:#2c3e50;color:white;padding:15px;text-align:center;}
.container{max-width:700px;margin:20px auto;}
.card{background:white;padding:20px;margin-bottom:20px;border-radius:10px;}
label{display:block;margin-top:10px;font-weight:bold;}
input,select{width:100%;padding:8px;margin-top:5px;}
button{margin-top:10px;padding:10px;background:#3498db;color:white;border:none;border-radius:6px;cursor:pointer;}
button:hover{background:#2980b9;}
#msg{position:fixed;top:10px;right:10px;padding:10px;color:white;display:none;border-radius:6px;}
.hidden{display:none;}
</style>
</head>

<body>

<header>
<h2>Appointment Scheduling</h2>
</header>

<div class="container">

<div class="card">
<h3>Book Appointment</h3>

<form id="form">

<label>Name</label>
<input id="name">

<label>DOB</label>
<input id="dob" type="date">

<label>Email</label>
<input id="email" type="email">

<label>Date</label>
<input id="date" type="date">

<label>Time</label>
<input id="time" type="time">

<label>Doctor</label>
<select id="doctor">
<option value="">Select</option>
<option>Dr. Smith</option>
<option>Dr. Brown</option>
</select>

<button type="submit">Book</button>
</form>
</div>

</div>

<div id="msg"></div>

<script>

/* ---------------- SUPABASE ---------------- */
const supabaseUrl = "https://xphczwydrcuvqsuthiii.supabase.co";
const supabaseKey = "YOUR_ANON_KEY_HERE";

const client = supabase.createClient(supabaseUrl, supabaseKey);

/* ---------------- UI ---------------- */
function msg(text, err=false){
const m=document.getElementById("msg");
m.innerText=text;
m.style.background=err?"#e74c3c":"#2ecc71";
m.style.display="block";
setTimeout(()=>m.style.display="none",3000);
}

/* ---------------- GET VALUE ---------------- */
const val = (id)=>document.getElementById(id).value.trim();

/* ---------------- SUBMIT ---------------- */
document.getElementById("form").addEventListener("submit", async (e)=>{
e.preventDefault();

const appt = {
name: val("name"),
dob: val("dob"),
email: val("email"),
date: val("date"),
time: val("time"),
doctor: val("doctor"),
notes: ""
};

console.log("SEND:", appt);

/* VALIDATION */
for(let k in appt){
if(!appt[k]){
msg("Missing: " + k, true);
return;
}
}

/* INSERT */
const {error} = await client
.from("appointments")
.insert([appt]);

if(error){
console.log(error);
msg(error.message, true);
return;
}

msg("Appointment booked!");
e.target.reset();
});

</script>

</body>
</html>
