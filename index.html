<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Appointment System</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Segoe UI;background:#f4f6f9;margin:0;}

header{
background:#2c3e50;color:white;padding:15px;text-align:center;
}

.container{max-width:600px;margin:30px auto;}

.card{background:white;padding:20px;margin:10px;border-radius:10px;}

button{padding:10px;margin:5px;border:none;background:#3498db;color:white;border-radius:6px;cursor:pointer;}

input,select{width:100%;padding:8px;margin-top:5px;}

#loginModal{
display:block;
position:fixed;
top:30%;
left:40%;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,.3);
}
</style>
</head>

<body>

<header>
<h1>Appointment System</h1>
</header>

<!-- LOGIN FIRST -->
<div id="loginModal">
<h3>Login</h3>

<select id="role">
<option value="">Select Role</option>
<option value="nurse">Nurse</option>
<option value="doctor">Doctor</option>
</select>

<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Enter</button>
</div>

<!-- HOME UI -->
<div class="container" id="app" style="display:none;">

<div class="card">
<h2>Book Appointment</h2>

<input id="name" placeholder="Name">
<input id="dob" type="date">
<input id="email" placeholder="Email">
<input id="date" type="date">
<input id="time" type="time">

<select id="doctor">
<option>Dr. Smith</option>
<option>Dr. Brown</option>
</select>

<button onclick="book()">Book</button>
</div>

<div class="card">
<button onclick="location.href='nursing.html'">Go to Nurse Page</button>
<button onclick="location.href='doctor.html'">Go to Doctor Page</button>
</div>

</div>

<script>
const db=supabase.createClient(
"https://xphczwydrcuvqsuthiii.supabase.co",
"sb_publishable_7SiZfx1kbnTZmAm72b0haw_ZoSrqUYs"
);

function login(){
let role=document.getElementById("role").value;
let pass=document.getElementById("pass").value;

if(pass!=="1234"){
alert("Wrong password");
return;
}

if(role==="nurse" || role==="doctor"){
loginModal.style.display="none";
app.style.display="block";
}
}

async function book(){

await db.from("appointments").insert([{
name,
dob,
email,
date,
time,
doctor,
notes:""
}]);

alert("Booked!");
}
</script>

</body>
</html>
