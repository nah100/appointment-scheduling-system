<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Doctor</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h1>Doctor Dashboard</h1>
<a href="index.html">Home</a>

<select id="doc">
<option>Dr. Smith</option>
<option>Dr. Brown</option>
</select>

<button onclick="load()">Load</button>

<div id="list"></div>

<script>
const db=supabase.createClient(
"https://xphczwydrcuvqsuthiii.supabase.co",
"sb_publishable_7SiZfx1kbnTZmAm72b0haw_ZoSrqUYs"
);

async function load(){

let doc=document.getElementById("doc").value;

const {data}=await db.from("appointments").select("*");

list.innerHTML="";

data.filter(a=>a.doctor===doc).forEach(a=>{
let div=document.createElement("div");

div.innerHTML=`
<p>${a.name} - ${a.date} ${a.time}</p>
<textarea id="n${a.id}">${a.notes||""}</textarea>
<button onclick="save(${a.id})">Save</button>
`;

list.appendChild(div);
});
}

async function save(id){
let note=document.getElementById("n"+id).value;

await db.from("appointments").update({notes:note}).eq("id",id);

alert("Saved");
}
</script>

</body>
</html>
