<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Doctor</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Segoe UI;background:#f4f6f9;margin:0;}
header{background:#2c3e50;color:white;padding:15px;text-align:center;}
.container{max-width:700px;margin:20px auto;}
.card{background:white;padding:15px;margin-bottom:15px;border-radius:10px;}
textarea{width:100%;padding:10px;}
button{padding:10px;background:#3498db;color:white;border:none;border-radius:6px;}
</style>
</head>

<body>

<header><h2>Doctor Schedule</h2></header>

<div class="container" id="list"></div>

<script>
const db = supabase.createClient(
"https://xphczwydrcuvqsuthiii.supabase.co",
"sb_publishable_7SiZfx1kbnTZmAm72b0haw_ZoSrqUYs"
);

const doctor = localStorage.getItem("doctor") || "Dr. Smith";

async function load(){

const {data}=await db.from("appointments").select("*");

data
.filter(a=>a.doctor===doctor)
.sort((a,b)=>new Date(a.date+" "+a.time)-new Date(b.date+" "+b.time))
.forEach(a=>{

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<b>${a.name}</b> - ${a.date} ${a.time}
<textarea id="n${a.id}">${a.notes||""}</textarea>
<button onclick="save(${a.id})">Save Notes</button>
`;

list.appendChild(div);
});
}

async function save(id){
let note=document.getElementById("n"+id).value;
await db.from("appointments").update({notes:note}).eq("id",id);
alert("Saved");
}

load();
</script>

</body>
</html>
