<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Doctor Schedule</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {font-family:'Segoe UI',sans-serif;background:#f4f6f9;margin:0;}
header{background:#2c3e50;color:white;padding:15px;text-align:center;}
.container{max-width:600px;margin:30px auto;}
.card{background:white;padding:20px;border-radius:10px;margin-bottom:20px;}
textarea{width:100%;padding:10px;}
button{padding:10px;background:#3498db;color:white;border:none;border-radius:6px;}
</style>
</head>

<body>

<header>
<h1>Doctor Schedule</h1>
</header>

<div class="container" id="list"></div>

<script>
const db = supabase.createClient(
"https://xphczwydrcuvqsuthiii.supabase.co",
"sb_publishable_7SiZfx1kbnTZmAm72b0haw_ZoSrqUYs"
);

async function load(){

const {data}=await db.from("appointments").select("*");

list.innerHTML="";

data.forEach(a=>{

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<p>${a.name} — ${a.date} ${a.time}</p>
<textarea id="n${a.id}">${a.notes||""}</textarea>
<button onclick="save(${a.id})">Save</button>
`;

list.appendChild(div);

});
}

async function save(id){
let note=document.getElementById("n"+id).value;
await db.from("appointments").update({notes:note}).eq("id",id);
alert("Saved");
}

load();
</script>

</body>
</html>
